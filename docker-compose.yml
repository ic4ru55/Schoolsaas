services:
  db:
    image: postgres:16-alpine
    container_name: schoolsaas-bf-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-schoolsaas_bf}
      POSTGRES_USER: ${POSTGRES_USER:-schoolsaas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-schoolsaas}
    ports:
      - "5434:5432"
    volumes:
      - schoolsaas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-schoolsaas} -d ${POSTGRES_DB:-schoolsaas_bf}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: schoolsaas-bf-redis
    restart: unless-stopped
    ports:
      - "6381:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: schoolsaas-bf-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://schoolsaas:schoolsaas@db:5432/schoolsaas_bf?schema=public
      APP_PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-change-me-before-production}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: schoolsaas-bf-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3002:3000"
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: schoolsaas-bf-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://schoolsaas:schoolsaas@db:5432/schoolsaas_bf?schema=public
      BACKUP_LOCAL_DIR: /app/data/backups
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-replace-with-a-32-byte-secret}
    volumes:
      - schoolsaas_backups:/app/data/backups
    depends_on:
      db:
        condition: service_healthy

volumes:
  schoolsaas_pgdata:
  schoolsaas_backups:

